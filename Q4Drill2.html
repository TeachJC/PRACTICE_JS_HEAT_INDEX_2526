<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <title>Q4 Drill 2</title>

    <style>
         #deg, h3, summary, i{
            font-family: 'Courier New', Courier, monospace;
            font-weight: bold;
            color: white;
         }
         body{
            background-image: url('https://img.freepik.com/free-vector/abstract-topography-map-design-with-heat-map-overlay_1048-12391.jpg?semt=ais_rp_progressive&w=740&q=80');
            background-repeat: no-repeat;
            background-attachment: fixed;
            background-size: cover;
         }
         .form-control::placeholder{
            text-align: center;
            color: rgb(2, 2, 109); 
            font-family: 'Courier New', Courier, monospace;
        }
        .form-control{
            text-align: center;
        }
        i{
            font-size: 9px;
        }
    </style>
    
</head>
<body>
    
        <div class="container w-100 rounded-5 d-flex justify-content-center align-items-center vh-100">
    
            <div class="row bg-dark rounded-5 p-4" style="width: 600px;">

                <div class="col-lg-8 justify-content-center align-items-center">

                    <h3 class="text-warning">Heat Index Checker</h3>
                    <details ontoggle="instruct()">
                        <summary>Note:</summary>
                        <i id="note"></i>
                    </details>
                    <br>

                    <form>
                       
                        <label id="deg" class="m-2">Degree in °C</label>

                        <input type="number" class="form-control mb-3" id="temp" placeholder="Input degree value">

                        <label id="deg" class="m-2">humidity in %</label>

                        <input type="number" class="form-control mb-3" id="humid" placeholder="Input percentage value">
                    
                        <button type="button" class="btn btn-warning" onclick="HeatIndex()" >Check</button>

                        <br><br><p><span id="message1" style="color: red; " class="fst-italic"></span></p>
                    
                    </form>
                </div>

                <div class="col-lg-4 d-flex justify-content-center align-items-center">
                     <img src="heat.png" style="width: 200px; height: 200px;" class="mx-auto d-block">  
                </div>
            </div>


        </div>
   

    <script>
        function HeatIndex() {
            let temp, humidity, HI, status;

            temp = parseFloat(document.getElementById("temp").value);
            humidity = parseFloat(document.getElementById("humid").value);

            // Heat Index formula
            HI = temp + (0.33 * humidity) - 4;

            switch(true) {

                case (HI <= 27):
                    status = "Comfortable / Cool";
                    break;

                case (HI <= 32):
                    status = "Warm";
                    break;

                case (HI <= 37):
                    status = "Hot";
                    break;

                case (HI <= 41):
                    status = "Very Hot / Caution";
                    break;

                default:
                    status = "Extreme Heat / Danger";
            }

            alert("Heat Index: " + HI.toFixed(1) + "°C\nStatus: " + status);
        }
        
    </script>
    
</body>
</html>
